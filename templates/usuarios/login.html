{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Inventario Kasu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/kasu.css' %}" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
<div class="card shadow" style="width:100%;max-width:420px;">
  <div class="card-body p-4 p-md-5">
    <div class="text-center mb-4">
      <img src="{% static 'img/logo.webp' %}" height="80" alt="Transportes Kasu">
      <h5 class="mt-3 fw-bold text-muted">Sistema de Inventario TI</h5>
    </div>
    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
        <div class="alert alert-danger py-2">Usuario o contraseña incorrectos.</div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <input type="text" name="username" class="form-control form-control-lg"
               autocomplete="username" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" name="password" class="form-control form-control-lg"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-kasu btn-lg w-100">Ingresar</button>
    </form>
  </div>
  <div class="card-footer text-center text-muted py-2" style="font-size:.8rem;">
    Transportes Kasu &copy; {{ "now"|date:"Y" }} — PROT-TI-001
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
