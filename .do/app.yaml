name: kasu-inventario-ti
region: nyc

services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: TU_USUARIO/SistemaInventarioKasu
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /usuarios/login/
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ${APP_DOMAIN}
      - key: CSRF_TRUSTED_ORIGINS
        value: https://${APP_DOMAIN}
      - key: DBURL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SSLMODE
        value: require
      - key: USE_SPACES
        value: "True"
      - key: SPACES_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SPACES_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SPACES_BUCKET
        value: kasu-inventario
      - key: SPACES_ENDPOINT
        value: https://nyc3.digitaloceanspaces.com
      - key: SPACES_REGION
        value: nyc3
      - key: SPACES_CDN_ENDPOINT
        value: kasu-inventario.nyc3.cdn.digitaloceanspaces.com
      - key: EMAIL_HOST_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: FROM_EMAIL
        value: invetario@transporteskasu.com.mx

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    dockerfile_path: Dockerfile
    github:
      repo: TU_USUARIO/SistemaInventarioKasu
      branch: main
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DBURL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SSLMODE
        value: require
      - key: USE_SPACES
        value: "True"
      - key: SPACES_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SPACES_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SPACES_BUCKET
        value: kasu-inventario
      - key: SPACES_ENDPOINT
        value: https://nyc3.digitaloceanspaces.com
      - key: SPACES_REGION
        value: nyc3
      - key: SPACES_CDN_ENDPOINT
        value: kasu-inventario.nyc3.cdn.digitaloceanspaces.com
    run_command: uv run python manage.py migrate --noinput
